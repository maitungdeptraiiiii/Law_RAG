services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: law-rag-backend:local
    container_name: law-rag-backend
    env_file:
      - ./env.txt
    environment:
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-local}
    volumes:
      - ./output:/app/output
      - ./env.txt:/app/env.txt
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s 
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./law-rag-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8000}
    image: law-rag-frontend:local
    container_name: law-rag-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

