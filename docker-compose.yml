services:
  backend:
    image: maitung123/law-rag-backend:latest
    container_name: law-rag-backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MONGODB_ATLAS_URI: ${MONGODB_ATLAS_URI:-}
      MONGODB_ATLAS_DB: ${MONGODB_ATLAS_DB:-}
      MONGODB_ATLAS_COLLECTION: ${MONGODB_ATLAS_COLLECTION:-}
      MONGODB_ATLAS_VECTOR_INDEX: ${MONGODB_ATLAS_VECTOR_INDEX:-}
    volumes:
      - law_rag_output:/app/output
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s 
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    image: maitung123/law-rag-frontend:latest
    container_name: law-rag-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  law_rag_output:

